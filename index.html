<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BoviTag Install Tool</title>

<style>
:root{
  --green:#1B5E3B; --green-dk:#134429; --tag:#F5B800; --tag-dk:#C99700;
  --bg:#F2F4F1; --card:#FFFFFF; --line:#DDE3DC; --txt:#20291F; --sub:#6B7568;
  --red:#C0392B; --blue:#2563EB;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Noto Sans KR','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;padding-bottom:40px}
.wrap{max-width:520px;margin:0 auto}

/* header */
header{background:var(--green);color:#fff;padding:6px 12px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px}
.logo{display:flex;align-items:center;gap:8px;min-width:0}
.logo span{color:var(--tag)}
.langs{display:flex;gap:4px}
.langs button{background:rgba(255,255,255,.14);border:none;color:#fff;font-size:10px;padding:4px 6px;border-radius:5px;font-weight:600}
.langs button.on{background:var(--tag);color:#20291F}
.gear{background:none;border:none;color:#fff;font-size:16px;padding:2px 4px}

/* farm panel */
.farm{background:var(--card);border-bottom:1px solid var(--line);padding:12px 14px}
.frow{display:flex;gap:8px;margin-bottom:8px}
.frow label{flex:0 0 78px;font-size:12px;color:var(--sub);align-self:center;font-weight:600}
.frow input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;min-width:0}
.filebar{display:flex;gap:8px;align-items:center;margin-top:4px}
.btn{border:none;border-radius:9px;padding:10px 14px;font-size:14px;font-weight:700;color:#fff;background:var(--green)}
.btn.sm{padding:8px 12px;font-size:13px}
.btn.gray{background:#8B958A}
.btn.yellow{background:var(--tag);color:#20291F}
.btn.red{background:var(--red)}
.btn.blue{background:var(--blue)}
.btn:disabled{opacity:.4}
#fileInfo{font-size:12px;color:var(--sub);flex:1}
.counts{display:flex;gap:8px;margin-top:10px}
.cbox{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center}
.cbox b{display:block;font-size:20px;color:var(--green)}
.cbox span{font-size:11px;color:var(--sub)}

/* tabs */
.tabs{display:flex;background:var(--card);border-bottom:2px solid var(--line)}
.tabs button{flex:1;background:none;border:none;padding:12px;font-size:15px;font-weight:700;color:var(--sub);border-bottom:3px solid transparent}
.tabs button.on{color:var(--green);border-bottom-color:var(--tag)}

/* sections */
.sec{background:var(--card);margin:10px 10px 0;border:1px solid var(--line);border-radius:14px;padding:12px;position:relative}
.tagbadge{display:inline-flex;align-items:center;background:var(--tag);color:#20291F;font-weight:800;font-size:12px;padding:4px 12px 4px 8px;border-radius:6px 14px 14px 6px;position:relative;margin-bottom:6px}
.tagbadge::before{content:'';width:7px;height:7px;background:var(--card);border-radius:50%;margin-right:7px;box-shadow:inset 0 0 0 1.5px var(--tag-dk)}
.guide{font-size:13px;color:var(--sub);margin-bottom:8px;line-height:1.4}
.duo{display:flex;gap:10px}
.photoBox{flex:1;aspect-ratio:4/3;background:var(--bg);border:1.5px dashed var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--sub);font-size:12px;text-align:center;padding:4px}
.photoBox img{width:100%;height:100%;object-fit:cover}
.resBox{flex:1;display:flex;flex-direction:column;gap:6px;justify-content:flex-start}
.resBox .btn{width:100%}
.resBox .resVal{margin-top:auto}
.resVal{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:13px;font-weight:700;min-height:38px;word-break:break-all}
.resVal.ok{border-color:var(--green);background:#EBF4EE;color:var(--green-dk)}
.resVal.bad{border-color:var(--red);background:#FBEDEB;color:var(--red)}
.resVal small{display:block;font-weight:500;font-size:11px;color:var(--sub)}
.smsg{font-size:12px;min-height:16px}
.smsg.err{color:var(--red)} .smsg.ok{color:var(--green)}
.manual{margin-top:6px;position:relative}
.manual input{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:14px}
.sugs{background:#fff;border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px;max-height:180px;overflow:auto;margin-top:-2px}
.sugs div{padding:9px 10px;border-bottom:1px solid var(--bg);font-size:13px}
.sugs div b{color:var(--green)}
.rowbtns{display:flex;gap:8px;margin-top:8px}
#completeBar{margin:14px 10px 0}
#btnComplete{width:100%;padding:15px;font-size:17px;border-radius:12px}

/* manage */
.mtools{display:flex;gap:6px;margin:10px 10px 0;flex-wrap:wrap}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg);color:var(--sub);padding:7px 4px;text-align:left;font-size:11px;border-bottom:1px solid var(--line)}
td{padding:8px 4px;border-bottom:1px solid var(--bg);vertical-align:middle;word-break:break-all}
td .ic{background:none;border:none;font-size:17px;padding:2px 4px}
.editIn{width:100%;border:1px solid var(--tag);border-radius:6px;padding:5px;font-size:12px}
.pager{display:flex;justify-content:center;gap:6px;align-items:center;margin:12px 0}
.pager button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 11px;font-size:14px}
.pager span{font-size:12px;color:var(--sub);min-width:60px;text-align:center}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:460px;width:100%;max-height:88vh;overflow:auto;padding:16px}
.modal h3{font-size:16px;margin-bottom:10px;color:var(--green-dk)}
.modal img{width:100%;border-radius:10px;margin-bottom:8px}
.modal .mrow{font-size:13px;padding:5px 0;border-bottom:1px solid var(--bg)}
.modal .mrow b{color:var(--sub);font-weight:600;font-size:12px;display:inline-block;min-width:90px}
.cand{padding:11px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;font-size:13px}
.cand b{color:var(--green)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#20291F;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;z-index:200;display:none;max-width:90%;text-align:center}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--tag);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important}
input[type=file]{display:none}
</style>
</head>

<!-- 공용 상단: 농장 정보 -->
<div class="farm">
  <div class="frow"><label data-i18n="farmName"></label><input id="farmName"><label data-i18n="subName" style="flex-basis:52px"></label><input id="subName" style="flex:.7"></div>
  <div class="frow"><label data-i18n="address"></label><input id="address" data-i18n-ph="addressPh"></div>
  <div class="frow"><label data-i18n="workDate"></label><input id="workDate" type="date" style="flex:.8"><div style="flex:1"></div></div>
  <div class="filebar">
    <button class="btn sm yellow" onclick="document.getElementById('csvFile').click()" data-i18n="loadFile"></button>
    <input type="file" id="csvFile" accept=".csv,.xlsx,.xls">
    <div id="fileInfo" data-i18n="noFile"></div>
  </div>
  <div class="counts">
    <div class="cbox"><b id="cntToday">0</b><span data-i18n="installedToday"></span></div>
    <div class="cbox"><b id="cntTotal">0</b><span data-i18n="installedTotal"></span></div>
    <div class="cbox"><b id="cntAnimals">-</b><span data-i18n="animalCount"></span></div>
  </div>
</div>

<div class="tabs">
  <button id="tabInstall" class="on" onclick="showTab('install')">📷 <span data-i18n="tabInstall"></span></button>
  <button id="tabManage" onclick="showTab('manage')">📋 <span data-i18n="tabManage"></span></button>
</div>

<!-- ============ 장착 화면 ============ -->
<div id="pgInstall">
  <!-- 객체 영역 -->
  <div class="sec">
    <div class="tagbadge"><span data-i18n="step1"></span></div>
    <div class="guide" data-i18n="step1Guide"></div>
    <div class="duo">
      <div class="photoBox" id="animalPhotoBox" onclick="document.getElementById('animalCam').click()" data-i18n="tapToShoot"></div>
      <div class="resBox">
        <button class="btn sm" onclick="document.getElementById('animalCam').click()">📷 <span data-i18n="shoot"></span></button>
        <div class="resVal" id="animalRes"><span data-i18n="animalNo"></span></div>
        <button class="btn sm gray" onclick="toggleManual('animal')" data-i18n="manualInput"></button>
        <div class="smsg" id="animalMsg"></div>
      </div>
    </div>
    <input type="file" id="animalCam" accept="image/*" capture="environment">
    <div class="manual hidden" id="animalManual">
      <input id="animalSearch" data-i18n-ph="searchPh" autocomplete="off">
      <div class="sugs hidden" id="animalSugs"></div>
    </div>
  </div>

  <!-- 디바이스 영역 -->
  <div class="sec">
    <div class="tagbadge"><span data-i18n="step2"></span></div>
    <div class="guide" data-i18n="step2Guide"></div>
    <div class="duo">
      <div class="photoBox" id="devicePhotoBox" onclick="document.getElementById('deviceCam').click()" data-i18n="tapToShoot"></div>
      <div class="resBox">
        <button class="btn sm" onclick="document.getElementById('deviceCam').click()">📷 <span data-i18n="shoot"></span></button>
        <div class="resVal" id="deviceRes"><span data-i18n="deviceMac"></span></div>
        <button class="btn sm gray" onclick="toggleManual('device')" data-i18n="manualInput"></button>
        <div class="smsg" id="deviceMsg"></div>
      </div>
    </div>
    <input type="file" id="deviceCam" accept="image/*" capture="environment">
    <div class="manual hidden" id="deviceManual">
      <input id="deviceInput" data-i18n-ph="macPh" autocomplete="off">
      <div class="rowbtns"><button class="btn sm blue" onclick="applyDeviceManual()" data-i18n="apply"></button></div>
    </div>
  </div>

  <div id="completeBar">
    <button class="btn" id="btnComplete" onclick="saveRecord()" disabled>✓ <span data-i18n="complete"></span></button>
  </div>
</div>

<!-- ============ 관리 화면 ============ -->
<div id="pgManage" class="hidden">
  <div class="mtools">
    <button class="btn sm blue" onclick="exportJSON()" data-i18n="exportJson"></button>
    <button class="btn sm blue" onclick="exportCSV()" data-i18n="exportCsv"></button>
    <button class="btn sm gray" onclick="document.getElementById('importFile').click()" data-i18n="importJson"></button>
    <input type="file" id="importFile" accept=".json">
  </div>
  <div class="sec">
    <table>
      <thead><tr>
        <th style="width:26px" data-i18n="colNo"></th><th data-i18n="colDateTime"></th>
        <th data-i18n="colAnimal"></th><th data-i18n="colDevice"></th><th style="width:78px"></th>
      </tr></thead>
      <tbody id="recBody"></tbody>
    </table>
    <div class="pager">
      <button onclick="goPage('first')">⏮</button><button onclick="goPage('prev')">◀</button>
      <span id="pageInfo">-</span>
      <button onclick="goPage('next')">▶</button><button onclick="goPage('last')">⏭</button>
    </div>
  </div>
</div>
</div><!-- wrap -->

<!-- 상세보기 팝업 -->
<div class="overlay" id="ovDetail">
  <div class="modal">
    <h3 data-i18n="detail"></h3>
    <div id="detailBody"></div>
    <button class="btn" style="width:100%;margin-top:10px" onclick="closeOv('ovDetail')">↩ <span data-i18n="back"></span></button>
  </div>
</div>

<!-- 후보 선택 팝업 -->
<div class="overlay" id="ovCand">
  <div class="modal">
    <h3 data-i18n="selectCandidate"></h3>
    <div id="candBody"></div>
    <button class="btn gray" style="width:100%;margin-top:6px" onclick="closeOv('ovCand')" data-i18n="close"></button>
  </div>
</div>

<!-- 설정 팝업 -->
<div class="overlay" id="ovSettings">
  <div class="modal">
    <h3 data-i18n="settings"></h3>
    <div style="font-size:12px;color:var(--sub);margin-bottom:6px" data-i18n="apiKeyHint"></div>
    <input id="apiKeyInput" style="width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:13px" placeholder="Google Cloud Vision API Key">
    <div class="rowbtns">
      <button class="btn" style="flex:1" onclick="saveSettings()" data-i18n="save"></button>
      <button class="btn gray" style="flex:1" onclick="closeOv('ovSettings')" data-i18n="close"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ================= IndexedDB ================= */
let db;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('bovicare_install',1);
  r.onupgradeneeded=e=>{e.target.result.createObjectStore('records',{keyPath:'id',autoIncrement:true})};
  r.onsuccess=e=>{db=e.target.result;res()}; r.onerror=rej;
})}
function dbAll(){return new Promise(res=>{const o=[];const c=db.transaction('records').objectStore('records').openCursor();
  c.onsuccess=e=>{const cu=e.target.result;if(cu){o.push(cu.value);cu.continue()}else res(o)}})}
function dbAdd(rec){return new Promise(res=>{const r=db.transaction('records','readwrite').objectStore('records').add(rec);r.onsuccess=e=>res(e.target.result)})}
function dbPut(rec){return new Promise(res=>{db.transaction('records','readwrite').objectStore('records').put(rec).onsuccess=res})}
function dbDel(id){return new Promise(res=>{db.transaction('records','readwrite').objectStore('records').delete(id).onsuccess=res})}

/* ================= 초기화 ================= */

  await openDB(); records=await dbAll();
  document.getElementById('workDate').value=new Date().toISOString().slice(0,10);
  ['farmName','subName','address'].forEach(id=>{
    const el=document.getElementById(id);
    el.value=localStorage.getItem('bc_'+id)||'';
    el.oninput=()=>localStorage.setItem('bc_'+id,el.value);

  document.getElementById('apiKeyInput').placeholder=DEFAULT_API_KEY?'기본 키 적용됨 (변경 시에만 입력)':'Google Cloud Vision API Key';
  const savedCsv=localStorage.getItem('bc_animals');
  if(savedCsv){animals=JSON.parse(savedCsv)}
  applyLang(); updateCounts();
  document.getElementById('csvFile').onchange=loadAnimalFile;
  document.getElementById('animalCam').onchange=e=>onAnimalPhoto(e.target.files[0]);
  document.getElementById('deviceCam').onchange=e=>onDevicePhoto(e.target.files[0]);
  document.getElementById('animalSearch').oninput=onAnimalSearch;
  document.getElementById('importFile').onchange=importJSON;
};
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2500)}
function digits(s){return (s||'').replace(/\D/g,'')}
function todayStr(){return document.getElementById('workDate').value||new Date().toISOString().slice(0,10)}

/* ================= 개체 파일 로딩 ================= */
function loadAnimalFile(e){
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      let hi=rows.findIndex(r=>r&&r.some(c=>String(c).includes('개체식별번호')));
      if(hi<0){toast('개체식별번호 column not found');return}
      const hdr=rows[hi].map(c=>String(c||''));
      const ci=hdr.findIndex(c=>c.trim()==='개체식별번호');
      const cm=hdr.findIndex(c=>c.includes('개체관리번호'));
      animals=[];
      for(let i=hi+1;i<rows.length;i++){
        const id=rows[i]&&rows[i][ci]?String(rows[i][ci]).trim():'';
        if(!id)continue;
        animals.push({id,idDigits:digits(id),mgmt:cm>=0&&rows[i][cm]?String(rows[i][cm]).trim():''});
      }
      localStorage.setItem('bc_animals',JSON.stringify(animals));
      updateFileInfo(); updateCounts();
      toast(T('fileLoaded')(animals.length));
    }catch(err){toast('File error: '+err.message)}
  };
  rd.readAsArrayBuffer(f);
}
function updateFileInfo(){
  document.getElementById('fileInfo').textContent=animals.length?T('fileLoaded')(animals.length):T('noFile');
}
function updateCounts(){
  const td=todayStr();
  document.getElementById('cntToday').textContent=records.filter(r=>r.date===td).length;
  document.getElementById('cntTotal').textContent=records.length;
  document.getElementById('cntAnimals').textContent=animals.length||'-';
}

/* ================= 탭 ================= */
function showTab(t){
  document.getElementById('pgInstall').classList.toggle('hidden',t!=='install');
  document.getElementById('pgManage').classList.toggle('hidden',t!=='manage');
  document.getElementById('tabInstall').classList.toggle('on',t==='install');
  document.getElementById('tabManage').classList.toggle('on',t==='manage');
  if(t==='manage'){page=1;renderList()}
}

/* ================= 사진 처리 ================= */
function resizeImg(file,max){return new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(Math.max(w,h)>max){const k=max/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k)}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    res(cv);
  };
  img.src=URL.createObjectURL(file);
})}

/* ================= 객체: OCR ================= */
async function onAnimalPhoto(file){
  if(!file)return;
  const cv=await resizeImg(file,1280);
  cur.aPhoto=cv.toDataURL('image/jpeg',0.72);
  document.getElementById('animalPhotoBox').innerHTML=`<img src="${cur.aPhoto}">`;
  setAnimal('','');
  const key=getApiKey();
  const msg=document.getElementById('animalMsg');
  if(!key){msg.className='smsg err';msg.textContent=T('apiKeyMissing');toggleManual('animal',true);return}
  msg.className='smsg';msg.innerHTML=`<span class="spin"></span>${T('recognizing')}`;
  try{
    const b64=cur.aPhoto.split(',')[1];
    const rsp=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${encodeURIComponent(key)}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'TEXT_DETECTION'}]}]})
    });
    const j=await rsp.json();
    const text=j.responses&&j.responses[0]&&j.responses[0].fullTextAnnotation?j.responses[0].fullTextAnnotation.text:'';
    if(!text)throw 0;
    matchAnimalFromText(text);
  }catch(e){
    msg.className='smsg err';msg.textContent=T('recogFail');toggleManual('animal',true);
  }
}
function matchAnimalFromText(text){
  const msg=document.getElementById('animalMsg');
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  // 후보 숫자열 만들기: 전체 연결 + 각 줄 + 인접 줄 결합
  const seqs=new Set();
  seqs.add(digits(text));
  lines.forEach(l=>{const d=digits(l);if(d.length>=4)seqs.add(d)});
  for(let i=0;i<lines.length-1;i++){
    const d=digits(lines[i])+digits(lines[i+1]);
    if(d.length>=8)seqs.add(d);
    if(i<lines.length-2)seqs.add(digits(lines[i])+digits(lines[i+1])+digits(lines[i+2]));
  }
  // 1) 12자리(002+9) 탐색
  let found=null;
  for(const sq of seqs){const m=sq.match(/002\d{9}/);if(m){found=m[0];break}}
  // 2) 9자리 탐색 → 002 접두 보정 (귀표에 002가 안 보이는 경우)
  if(!found){
    for(const sq of seqs){if(sq.length===9){found='002'+sq;break}}
    if(!found)for(const sq of seqs){if(sq.length>=10&&sq.length<=11){found='002'+sq.slice(-9);break}}
  }
  if(found){
    const id='KOR-002-'+found.slice(3);
    if(!animals.length){setAnimal(id,'');msg.className='smsg ok';msg.textContent=T('recogOk')+' · '+T('noCsvNote');return}
    const hit=animals.find(a=>a.idDigits.endsWith(found));
    if(hit){setAnimal(hit.id,hit.mgmt);msg.className='smsg ok';msg.textContent=T('recogOk');return}
    setAnimal(id,'',true);
    msg.className='smsg err';msg.textContent=T('notInCsv');return;
  }
  // 3) 큰 글씨 4자리 후보 매칭
  if(animals.length){
    const groups=[...new Set((text.match(/\d{4}/g)||[]))];
    let cands=[];
    groups.forEach(g=>{
      animals.forEach(a=>{
        const d=a.idDigits;
        if(d.slice(-5,-1)===g||d.slice(-4)===g)cands.push(a);
      });
    });
    cands=[...new Map(cands.map(a=>[a.id,a])).values()];
    if(cands.length===1){setAnimal(cands[0].id,cands[0].mgmt);msg.className='smsg ok';msg.textContent=T('recogOk');return}
    if(cands.length>1){showCandidates(cands);return}
  }
  msg.className='smsg err';msg.textContent=T('recogFail');toggleManual('animal',true);
}
function showCandidates(cands){
  const body=document.getElementById('candBody');
  body.innerHTML=cands.slice(0,20).map(a=>
    `<div class="cand" onclick="pickCand('${a.id}','${a.mgmt.replace(/'/g,"\\'")}')"><b>${a.id}</b><br><small>${a.mgmt}</small></div>`).join('');
  document.getElementById('ovCand').classList.add('show');
}
function pickCand(id,mgmt){
  closeOv('ovCand'); setAnimal(id,mgmt);
  const msg=document.getElementById('animalMsg');msg.className='smsg ok';msg.textContent=T('recogOk');
}
function setAnimal(id,mgmt,bad){
  cur.aId=id;cur.aMgmt=mgmt||'';
  const el=document.getElementById('animalRes');
  if(id){el.className='resVal '+(bad?'bad':'ok');el.innerHTML=`${id}${mgmt?`<small>${T('mgmtNoL')}: ${mgmt}</small>`:''}`}
  else{el.className='resVal';el.innerHTML=`<span>${T('animalNo')}</span>`}
  checkComplete();
}

/* 객체 수동 검색 */
function toggleManual(which,forceOpen){
  const el=document.getElementById(which+'Manual');
  if(forceOpen)el.classList.remove('hidden');else el.classList.toggle('hidden');
  if(which==='animal'&&!el.classList.contains('hidden'))document.getElementById('animalSearch').focus();
}
function onAnimalSearch(){
  const q=this.value.trim(); const box=document.getElementById('animalSugs');
  if(!q){box.classList.add('hidden');return}
  if(!animals.length){ // 파일 없으면 직접 입력 허용
    box.innerHTML=`<div onclick="manualPick('${q.replace(/'/g,'')}','')">"${q}" — ${T('noCsvNote')}</div>`;
    box.classList.remove('hidden');return;
  }
  const ql=q.toLowerCase(), qd=digits(q);
  const hits=animals.filter(a=>
    a.id.toLowerCase().includes(ql)||(qd&&a.idDigits.includes(qd))||a.mgmt.toLowerCase().includes(ql)
  ).slice(0,12);
  if(!hits.length){box.innerHTML=`<div style="color:var(--red)">${T('notInCsv')}</div>`;box.classList.remove('hidden');return}
  box.innerHTML=hits.map(a=>`<div onclick="manualPick('${a.id}','${a.mgmt.replace(/'/g,"\\'")}')"><b>${a.id}</b> · ${a.mgmt}</div>`).join('');
  box.classList.remove('hidden');
}
function manualPick(id,mgmt){
  document.getElementById('animalSugs').classList.add('hidden');
  document.getElementById('animalSearch').value='';
  setAnimal(id,mgmt);
  const msg=document.getElementById('animalMsg');msg.className='smsg ok';msg.textContent=T('recogOk');
}

/* ================= 디바이스: QR ================= */
async function onDevicePhoto(file){
  if(!file)return;
  const msg=document.getElementById('deviceMsg');
  msg.className='smsg';msg.innerHTML=`<span class="spin"></span>${T('recognizing')}`;
  try{
    const cv=await resizeImg(file,1600);
    cur.dPhoto=cv.toDataURL('image/jpeg',0.72);
    document.getElementById('devicePhotoBox').innerHTML=`<img src="${cur.dPhoto}">`;
    setDevice('');
    let data=await detectQR(cv);
    if(data){
      const mac=parseMac(data);
      if(records.some(r=>r.mac===mac)){setDevice(mac,true);msg.className='smsg err';msg.textContent=T('dupDevice');}
      else{setDevice(mac);msg.className='smsg ok';msg.textContent=T('recogOk');}
    }else{
      msg.className='smsg err';msg.textContent=T('qrFail');toggleManual('device',true);
    }
  }catch(e){
    msg.className='smsg err';msg.textContent=T('qrFail');toggleManual('device',true);
  }
}
function cropCanvas(cv,rx,ry,rw,rh){
  const c=document.createElement('canvas');
  c.width=Math.round(cv.width*rw);c.height=Math.round(cv.height*rh);
  c.getContext('2d').drawImage(cv,cv.width*rx,cv.height*ry,c.width,c.height,0,0,c.width,c.height);
  return c;
}
async function detectQR(cv){
  // 시도 대상: 원본 + 중앙 60% + 중앙 40% 크롭
  const targets=[cv,cropCanvas(cv,.2,.2,.6,.6),cropCanvas(cv,.3,.3,.4,.4)];
  // 1) 안드로이드/크롬 네이티브 BarcodeDetector
  if('BarcodeDetector' in window){
    try{
      const det=new BarcodeDetector({formats:['qr_code']});
      for(const t of targets){
        const r=await det.detect(t);
        if(r&&r.length&&r[0].rawValue)return r[0].rawValue;
      }
    }catch(e){}
  }
  // 2) jsQR 폴백 (여러 배율)
  if(typeof jsQR==='function'){
    for(const t of targets){
      for(const scale of [1,1.6,0.6]){
        const w=Math.round(t.width*scale),h=Math.round(t.height*scale);
        if(w>2400||w<100)continue;
        const c2=document.createElement('canvas');c2.width=w;c2.height=h;
        const ctx=c2.getContext('2d');
        ctx.imageSmoothingEnabled=true;
        ctx.drawImage(t,0,0,w,h);
        const d=ctx.getImageData(0,0,w,h);
        const code=jsQR(d.data,w,h,{inversionAttempts:'attemptBoth'});
        if(code&&code.data)return code.data;
      }
    }
  }
  return null;
}
function parseMac(s){
  const m=s.match(/([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}/);
  if(m)return m[0].toUpperCase().replace(/-/g,':');
  const hex=s.replace(/[^0-9A-Fa-f]/g,'');
  if(hex.length===12)return hex.toUpperCase().match(/.{2}/g).join(':');
  return s.trim();
}
function applyDeviceManual(){
  const v=document.getElementById('deviceInput').value.trim();
  if(!v)return;
  const mac=parseMac(v);
  const msg=document.getElementById('deviceMsg');
  if(records.some(r=>r.mac===mac)){setDevice(mac,true);msg.className='smsg err';msg.textContent=T('dupDevice');}
  else{setDevice(mac);msg.className='smsg ok';msg.textContent=T('recogOk');}
  document.getElementById('deviceInput').value='';
}
function setDevice(mac,bad){
  cur.dMac=mac;
  const el=document.getElementById('deviceRes');
  if(mac){el.className='resVal '+(bad?'bad':'ok');el.textContent=mac}
  else{el.className='resVal';el.innerHTML=`<span>${T('deviceMac')}</span>`}
  checkComplete();
}
function checkComplete(){
  document.getElementById('btnComplete').disabled=!(cur.aId&&cur.dMac);
}

/* ================= 저장 ================= */
async function saveRecord(){
  if(!cur.aId||!cur.dMac)return;
  const now=new Date();
  const rec={
    date:todayStr(),
    time:now.toTimeString().slice(0,8),
    animalId:cur.aId, mgmt:cur.aMgmt, mac:cur.dMac,
    animalPhoto:cur.aPhoto, devicePhoto:cur.dPhoto,
    farm:document.getElementById('farmName').value,
    sub:document.getElementById('subName').value,
    addr:document.getElementById('address').value
  };
  rec.id=await dbAdd(rec);
  records.push(rec);
  toast('✓ '+T('saved'));
  // 초기화
  cur={aPhoto:null,aId:'',aMgmt:'',dPhoto:null,dMac:''};
  document.getElementById('animalPhotoBox').textContent=T('tapToShoot');
  document.getElementById('devicePhotoBox').textContent=T('tapToShoot');
  setAnimal('','');setDevice('');
  document.getElementById('animalMsg').textContent='';
  document.getElementById('deviceMsg').textContent='';
  document.getElementById('animalManual').classList.add('hidden');
  document.getElementById('deviceManual').classList.add('hidden');
  updateCounts();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ================= 관리 화면 ================= */
function pages(){return Math.max(1,Math.ceil(records.length/PAGE))}
function goPage(w){
  if(w==='first')page=1;else if(w==='last')page=pages();
  else if(w==='prev')page=Math.max(1,page-1);else page=Math.min(pages(),page+1);
  renderList();
}
function renderList(){
  const tb=document.getElementById('recBody'); if(!tb)return;
  page=Math.min(page,pages());
  const start=(page-1)*PAGE;
  const ordered=records.slice(start,start+PAGE);
  if(!records.length){tb.innerHTML=`<tr><td colspan="5" style="text-align:center;color:var(--sub);padding:18px">${T('empty')}</td></tr>`}
  else tb.innerHTML=ordered.map((r,i)=>{
    const seq=start+i+1;
    if(editingId===r.id){
      return `<tr>
        <td>${seq}</td><td>${r.date}<br>${r.time}</td>
        <td><input class="editIn" id="edA" value="${r.animalId}"></td>
        <td><input class="editIn" id="edD" value="${r.mac}"></td>
        <td><button class="ic" onclick="commitEdit(${r.id})">✅</button><button class="ic" onclick="editingId=null;renderList()">✖</button></td>
      </tr>`;
    }
    return `<tr>
      <td>${seq}</td><td>${r.date}<br>${r.time}</td>
      <td onclick="editingId=${r.id};renderList()">${r.animalId}${r.mgmt?`<br><small style="color:var(--sub)">${r.mgmt}</small>`:''}</td>
      <td onclick="editingId=${r.id};renderList()">${r.mac}</td>
      <td><button class="ic" onclick="showDetail(${r.id})">🔍</button><button class="ic" onclick="delRecord(${r.id})">🗑</button></td>
    </tr>`;
  }).join('');
  document.getElementById('pageInfo').textContent=`${page} / ${pages()}`;
}
async function commitEdit(id){
  const r=records.find(x=>x.id===id); if(!r)return;
  const na=document.getElementById('edA').value.trim();
  const nd=parseMac(document.getElementById('edD').value.trim());
  if(animals.length){
    const hit=animals.find(a=>a.id===na||a.idDigits===digits(na)||a.mgmt===na);
    if(hit){r.animalId=hit.id;r.mgmt=hit.mgmt}
    else{if(!confirm(T('notInCsv')+' OK?'))return; r.animalId=na;}
  }else r.animalId=na;
  r.mac=nd;
  await dbPut(r); editingId=null; renderList(); toast(T('updated'));
}
async function delRecord(id){
  if(!confirm(T('confirmDel')))return;
  await dbDel(id);
  records=records.filter(r=>r.id!==id);
  renderList(); updateCounts();
}
function showDetail(id){
  const r=records.find(x=>x.id===id); if(!r)return;
  document.getElementById('detailBody').innerHTML=`
    ${r.animalPhoto?`<div style="font-size:12px;color:var(--sub)">${T('animalPhotoL')}</div><img src="${r.animalPhoto}">`:''}
    ${r.devicePhoto?`<div style="font-size:12px;color:var(--sub)">${T('devicePhotoL')}</div><img src="${r.devicePhoto}">`:''}
    <div class="mrow"><b>${T('colAnimal')}</b>${r.animalId}</div>
    <div class="mrow"><b>${T('mgmtNoL')}</b>${r.mgmt||'-'}</div>
    <div class="mrow"><b>${T('colDevice')}</b>${r.mac}</div>
    <div class="mrow"><b>${T('colDateTime')}</b>${r.date} ${r.time}</div>
    <div class="mrow"><b>${T('farmName')}</b>${r.farm||'-'} ${r.sub||''}</div>`;
  document.getElementById('ovDetail').classList.add('show');
}
function closeOv(id){document.getElementById(id).classList.remove('show')}

/* ================= 내보내기 / 불러오기 ================= */
function dl(name,content,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;a.click();
}
function stamp(){return new Date().toISOString().slice(0,19).replace(/[:T]/g,'').slice(0,14)}
function exportJSON(){
  const data={app:'BoviCare-Install',version:1,
    farm:{name:document.getElementById('farmName').value,sub:document.getElementById('subName').value,addr:document.getElementById('address').value},
    exported:new Date().toISOString(),records};
  dl(`bovicare_install_${stamp()}.json`,JSON.stringify(data),'application/json');
}
function exportCSV(){
  const rows=[['No','Date','Time','AnimalID','MgmtNo','DeviceMAC','Farm','Sub']];
  records.forEach((r,i)=>rows.push([i+1,r.date,r.time,r.animalId,r.mgmt,r.mac,r.farm||'',r.sub||'']));
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dl(`bovicare_install_${stamp()}.csv`,csv,'text/csv');
}
function importJSON(e){
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=async ev=>{
    try{
      const j=JSON.parse(ev.target.result);
      if(!j.records||!Array.isArray(j.records))throw 0;
      if(!confirm(T('importConfirm')+` (${j.records.length})`))return;
      for(const r of j.records){delete r.id;r.id=await dbAdd(r);records.push(r)}
      renderList();updateCounts();toast('✓ '+T('saved'));
    }catch(err){toast('Import error')}
    e.target.value='';
  };
  rd.readAsText(f);
}

/* ================= 설정 ================= */
function openSettings(){document.getElementById('ovSettings').classList.add('show')}
function saveSettings(){
  localStorage.setItem('bc_apikey',document.getElementById('apiKeyInput').value.trim());
  closeOv('ovSettings');toast('✓');
}
